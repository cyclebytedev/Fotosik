<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fotosik - Sample GitHub Pages Site</title>
    <meta name="description" content="A sample public landing page for GitHub Pages." />
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        padding: 0;
        background: #f7f9fc;
        color: #1f2937;
      }
      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 3rem 1.25rem 4rem;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 2rem;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
        font-size: 2rem;
      }
      p {
        line-height: 1.7;
      }
      a {
        color: #2563eb;
      }
      .btn {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.75rem 1rem;
        background: #2563eb;
        color: white;
        text-decoration: none;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Welcome to Fotosik</h1>
        <p>This is a sample homepage created for GitHub Pages. It is ready to be served publicly from the repository root.</p>
        <p>You can replace this content with your own project information, features, screenshots, or contact details.</p>
        <a class="btn" href="privacy.html">Read the sample privacy policy</a>
      </section>
    </main>
  </body>
</html>
